<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог недвижимости | Агентство</title>
    <style>
        :root {
            --bg: #faf9f6;
            --card: #ffffff;
            --text: #2c2c2c;
            --text-light: #6b6b6b;
            --gold: #c9a96e;
            --gold-dark: #a68a56;
            --border: #e8e2d8;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            --shadow-hover: 0 12px 35px rgba(0, 0, 0, 0.12);
            --radius: 16px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .dark-theme {
            --bg: #1a1a1a;
            --card: #242424;
            --text: #e0e0e0;
            --text-light: #a0a0a0;
            --border: #333333;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            --shadow-hover: 0 12px 35px rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        /* ====== ШАПКА ====== */
        header {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.92);
            transition: all var(--transition);
        }

        .dark-theme header {
            background: rgba(36, 36, 36, 0.92);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo span {
            color: var(--gold);
        }

        .nav-links {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .theme-toggle,
        .back-link {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 8px 15px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all var(--transition);
            color: var(--text);
            white-space: nowrap;
            font-family: inherit;
            text-decoration: none;
        }

        .theme-toggle:hover,
        .back-link:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        /* ====== ОСНОВНОЙ КОНТЕНТ ====== */
        main {
            padding: 30px 20px 60px;
        }

        .page-title {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 30px;
            text-align: center;
            color: var(--text);
        }

        .page-title span {
            color: var(--gold);
        }

        /* ====== ПОИСК И ФИЛЬТРЫ ====== */
        .search-section {
            max-width: 900px;
            margin: 0 auto 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .search-input {
            width: 100%;
            padding: 14px 20px;
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 14px;
            color: var(--text);
            font-size: 1rem;
            outline: none;
            transition: var(--transition);
            font-family: inherit;
        }

        .search-input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 4px rgba(201, 169, 110, 0.15);
        }

        .search-input::placeholder {
            color: var(--text-light);
        }

        .filters {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .filter-btn {
            padding: 10px 22px;
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all var(--transition);
            color: var(--text);
            font-family: inherit;
        }

        .filter-btn:hover {
            border-color: var(--gold);
            transform: translateY(-2px);
        }

        .filter-btn.active {
            background: var(--gold);
            color: #fff;
            border-color: var(--gold);
            box-shadow: 0 4px 15px rgba(201, 169, 110, 0.3);
        }

        .dark-theme .filter-btn.active {
            color: #1a1a1a;
        }

        /* ====== СЧЁТЧИК ====== */
        .results-count {
            text-align: center;
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .results-count strong {
            color: var(--gold);
        }

        /* ====== СЕТКА КАРТОЧЕК ====== */
        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            transition: all var(--transition);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            cursor: pointer;
            position: relative;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-hover);
            border-color: var(--gold);
        }

        .card:active {
            transform: scale(0.98);
        }

        .card-img {
            height: 200px;
            background: linear-gradient(135deg, rgba(201, 169, 110, 0.1) 0%, rgba(201, 169, 110, 0.05) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            position: relative;
            overflow: hidden;
        }

        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-type {
            position: absolute;
            top: 12px;
            left: 12px;
            background: var(--gold);
            color: #fff;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            z-index: 2;
        }

        .dark-theme .card-type {
            color: #1a1a1a;
        }

        .card-body {
            padding: 20px 22px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text);
            line-height: 1.3;
        }

        .card-address {
            font-size: 0.85rem;
            color: var(--text-light);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .card-price {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--gold);
            margin-top: 5px;
        }

        .card-details {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            font-size: 0.9rem;
            color: var(--text-light);
            margin-top: 5px;
        }

        .card-detail {
            display: flex;
            align-items: center;
            gap: 5px;
            background: var(--bg);
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
        }

        .card-footer {
            margin-top: auto;
            padding-top: 10px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-light);
        }

        .card-view-btn {
            color: var(--gold);
            font-weight: 600;
            font-size: 0.85rem;
        }

        /* ====== МОДАЛЬНОЕ ОКНО ====== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal {
            background: var(--card);
            border-radius: var(--radius);
            width: 100%;
            max-width: 700px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.3s ease;
            position: relative;
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--bg);
            border: 1px solid var(--border);
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--text);
            transition: var(--transition);
            z-index: 10;
        }

        .modal-close:hover {
            background: #e74c3c;
            color: #fff;
            border-color: #e74c3c;
        }

        .modal-img {
            width: 100%;
            height: 350px;
            background: linear-gradient(135deg, rgba(201, 169, 110, 0.15) 0%, rgba(201, 169, 110, 0.05) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8rem;
            position: relative;
            overflow: hidden;
            border-radius: var(--radius) var(--radius) 0 0;
        }

        .modal-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .modal-type-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--gold);
            color: #fff;
            padding: 8px 18px;
            border-radius: 25px;
            font-weight: 700;
            font-size: 0.9rem;
            z-index: 2;
        }

        .dark-theme .modal-type-badge {
            color: #1a1a1a;
        }

        .modal-content {
            padding: 30px;
        }

        .modal-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 10px;
        }

        .modal-address {
            font-size: 1rem;
            color: var(--text-light);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .modal-price {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--gold);
            margin-bottom: 25px;
        }

        .modal-specs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .spec-item {
            background: var(--bg);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .spec-label {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-bottom: 5px;
        }

        .spec-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text);
        }

        .modal-description {
            background: var(--bg);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px solid var(--border);
            line-height: 1.6;
        }

        .modal-description h4 {
            color: var(--gold);
            margin-bottom: 10px;
        }

        .modal-contact {
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            color: #fff;
        }

        .dark-theme .modal-contact {
            color: #1a1a1a;
        }

        .modal-contact h4 {
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .modal-phone {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .modal-agent {
            font-size: 0.9rem;
            margin-top: 5px;
            opacity: 0.9;
        }

        /* ====== ЗАГЛУШКА ====== */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-light);
            grid-column: 1 / -1;
        }

        .empty-state-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state h2 {
            font-size: 1.5rem;
            color: var(--text);
            margin-bottom: 10px;
        }

        .empty-state p {
            font-size: 1rem;
            max-width: 400px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* ====== АДАПТИВ ====== */
        @media (max-width: 600px) {
            .catalog-grid {
                grid-template-columns: 1fr;
                gap: 18px;
            }

            .page-title {
                font-size: 1.6rem;
            }

            .card-img {
                height: 180px;
                font-size: 4rem;
            }

            .modal-img {
                height: 200px;
                font-size: 5rem;
            }

            .modal-content {
                padding: 20px;
            }

            .modal-title {
                font-size: 1.4rem;
            }

            .modal-price {
                font-size: 1.6rem;
            }

            .filter-btn {
                padding: 8px 16px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

    <!-- ====== ШАПКА ====== -->
    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo">
                    🏠 <span>Агентство недвижимости</span>
                </a>
                <div class="nav-links">
                    <a href="index.html" class="back-link">← На главную</a>
                    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙 Тёмная</button>
                </div>
            </nav>
        </div>
    </header>

    <!-- ====== ОСНОВНОЙ КОНТЕНТ ====== -->
    <main>
        <div class="container">
            <h1 class="page-title">🏡 <span>Каталог</span> недвижимости</h1>

            <!-- Поиск и фильтры -->
            <div class="search-section">
                <input type="text" class="search-input" id="searchInput" placeholder="🔍 Поиск по названию или адресу..." oninput="renderCatalog()">
                <div class="filters">
                    <button class="filter-btn active" onclick="setFilter('all', this)">🏠 Все</button>
                    <button class="filter-btn" onclick="setFilter('flat', this)">🏢 Квартиры</button>
                    <button class="filter-btn" onclick="setFilter('house', this)">🏡 Дома</button>
                    <button class="filter-btn" onclick="setFilter('plot', this)">🌳 Участки</button>
                    <button class="filter-btn" onclick="setFilter('district', this)">📍 Районы</button>
                </div>
            </div>

            <!-- Счётчик результатов -->
            <div class="results-count" id="resultsCount"></div>

            <!-- Сетка карточек -->
            <div class="catalog-grid" id="catalogGrid"></div>
        </div>
    </main>

    <!-- ====== МОДАЛЬНОЕ ОКНО ====== -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal" id="modalContent" onclick="event.stopPropagation()"></div>
    </div>

    <script>
        // ====== ТЁМНАЯ ТЕМА ======
        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            const btn = document.getElementById('themeBtn');
            const isDark = document.body.classList.contains('dark-theme');
            btn.textContent = isDark ? '☀️ Светлая' : '🌙 Тёмная';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-theme');
            document.getElementById('themeBtn').textContent = '☀️ Светлая';
        }

        // ====== ЗАГРУЗКА ДАННЫХ ======
        function loadCatalog() {
            const stored = localStorage.getItem('realtorData');
            if (stored) {
                try {
                    const data = JSON.parse(stored);
                    return data.catalog || [];
                } catch (e) {
                    return [];
                }
            }
            return [];
        }

        // ====== ФИЛЬТРАЦИЯ ======
        let currentFilter = 'all';

        function setFilter(filter, btn) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderCatalog();
        }

               // ====== РЕНДЕР КАТАЛОГА ======
        function renderCatalog() {
            const catalog = loadCatalog();
            const searchQuery = document.getElementById('searchInput').value.toLowerCase().trim();

            let filtered = catalog;

            // ФИЛЬТРАЦИЯ: если выбран район, показываем объекты только этого района
            if (currentFilter === 'district') {
                // Если нажата кнопка "Районы", мы показываем ВСЁ, но выводим район.
                // Чтобы фильтровать по конкретному району, нужно выбрать его в выпадающем списке в админке.
            } else if (currentFilter !== 'all') {
                filtered = filtered.filter(item => item.type === currentFilter);
            }

            if (searchQuery) {
                filtered = filtered.filter(item =>
                    item.title.toLowerCase().includes(searchQuery) ||
                    (item.address && item.address.toLowerCase().includes(searchQuery))
                );
            }

            const grid = document.getElementById('catalogGrid');
            const countEl = document.getElementById('resultsCount');

            // Исправляем название для фильтра "district"
            const typeLabels = { all: 'всех объектов', flat: 'квартир', house: 'домов', plot: 'участков', district: 'районов' };
            countEl.innerHTML = `Найдено: <strong>${filtered.length}</strong> ${typeLabels[currentFilter]}`;

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <h2>Пока нет добавленных объектов</h2>
                        <p>Наши агенты уже осматривают город. Новые предложения появятся здесь в ближайшее время.</p>
                    </div>`;
                return;
            }

            grid.innerHTML = filtered.map(item => {
                let typeLabel = '';
                let detailsHtml = '';
                let icon = item.img || '🏠';

                switch (item.type) {
                    case 'flat':
                        typeLabel = 'Квартира';
                        icon = item.img || '🏢';
                        detailsHtml = `
                            <div class="card-detail">📐 ${item.area || '—'}</div>
                            <div class="card-detail">🪜 ${item.floor || '—'} этаж</div>`;
                        break;
                    case 'house':
                        typeLabel = 'Дом';
                        icon = item.img || '🏡';
                        detailsHtml = `
                            <div class="card-detail">📐 ${item.area || '—'}</div>
                            <div class="card-detail">🌿 ${item.land || '—'}</div>`;
                        break;
                    case 'plot':
                        typeLabel = 'Участок';
                        icon = item.img || '🌳';
                        detailsHtml = `
                            <div class="card-detail">📏 ${item.area || '—'}</div>`;
                        break;
                    default:
                        typeLabel = 'Объект';
                        icon = item.img || '🏠';
                }

                // Проверяем, есть ли фото в массиве photos
                let photoHtml = icon;
                if (item.photos && Array.isArray(item.photos) && item.photos.length > 0) {
                    const firstPhoto = item.photos[0];
                    if (firstPhoto && firstPhoto.trim() !== '') {
                        photoHtml = `<img src="${firstPhoto}" alt="${item.title}" style="width:100%; height:100%; object-fit:cover;" onerror="this.style.display='none'; this.parentElement.innerHTML='${icon}'">`;
                    }
                }

                return `
                    <div class="card" onclick='openModal(${JSON.stringify(item).replace(/'/g, "&#39;")})'>
                        <div class="card-img">
                            ${photoHtml}
                            <span class="card-type">${typeLabel}</span>
                        </div>
                        <div class="card-body">
                            <h3 class="card-title">${item.title || 'Без названия'}</h3>
                            ${item.address ? `<div class="card-address">📍 ${item.address}</div>` : ''}
                            <div class="card-price">${item.price || 'Цена по запросу'}</div>
                            
                            ${item.district ? `<div class="card-detail">📍 ${item.district}</div>` : ''}
                            
                            <div class="card-details">${detailsHtml}</div>
                            
                            <div class="card-footer">
                                <span>ID: ${item.id || '—'}</span>
                                <span class="card-view-btn">Подробнее →</span>
                            </div>
                        </div>
                    </div>`;
            }).join('');
        }
        // ====== МОДАЛЬНОЕ ОКНО ======
        function openModal(item) {
            const modalContent = document.getElementById('modalContent');
            let typeLabel = '';
            let specsHtml = '';
            let icon = item.img || '🏠';

            switch (item.type) {
                case 'flat':
                    typeLabel = 'Квартира';
                    icon = item.img || '🏢';
                    specsHtml = `
                        <div class="spec-item">
                            <div class="spec-label">📐 Площадь</div>
                            <div class="spec-value">${item.area || '—'}</div>
                        </div>
                        <div class="spec-item">
                            <div class="spec-label">🪜 Этаж</div>
                            <div class="spec-value">${item.floor || '—'}</div>
                        </div>`;
                    break;
                case 'house':
                    typeLabel = 'Дом';
                    icon = item.img || '🏡';
                    specsHtml = `
                        <div class="spec-item">
                            <div class="spec-label">📐 Площадь дома</div>
                            <div class="spec-value">${item.area || '—'}</div>
                        </div>
                        <div class="spec-item">
                            <div class="spec-label">🌿 Участок</div>
                            <div class="spec-value">${item.land || '—'}</div>
                        </div>`;
                    break;
                case 'plot':
                    typeLabel = 'Участок';
                    icon = item.img || '🌳';
                    specsHtml = `
                        <div class="spec-item">
                            <div class="spec-label">📏 Площадь</div>
                            <div class="spec-value">${item.area || '—'}</div>
                        </div>`;
                    break;
                default:
                    typeLabel = 'Объект';
            }

            // Дополнительные характеристики
            if (item.rooms) {
                specsHtml += `
                    <div class="spec-item">
                        <div class="spec-label">🚪 Комнат</div>
                        <div class="spec-value">${item.rooms}</div>
                    </div>`;
            }

            // Берём первую фотографию для модального окна
            let modalPhotoHtml = icon;
            if (item.photos && Array.isArray(item.photos) && item.photos.length > 0) {
                const firstPhoto = item.photos[0];
                if (firstPhoto && firstPhoto.trim() !== '') {
                    modalPhotoHtml = `<img src="${firstPhoto}" alt="${item.title}" style="width:100%; height:100%; object-fit:cover;" onerror="this.style.display='none'; this.parentElement.innerHTML='<span style=font-size:8rem>${icon}</span>'">`;
                }
            }

            modalContent.innerHTML = `
                <span class="modal-close" onclick="closeModalDirect()">✕</span>
                <div class="modal-img">
                    ${modalPhotoHtml}
                    <span class="modal-type-badge">${typeLabel}</span>
                </div>
                <div class="modal-content">
                    <h2 class="modal-title">${item.title || 'Без названия'}</h2>
                    ${item.address ? `<div class="modal-address">📍 ${item.address}</div>` : ''}
                    <div class="modal-price">${item.price || 'Цена по запросу'}</div>
                    
                    <div class="modal-specs">
                        ${specsHtml}
                    </div>

                                        <div class="modal-description">
                        <h4>📝 Описание</h4>
                        <p>${item.description || 'Описание пока не добавлено'}</p>
                    </div>

                    <div class="modal-contact">
                        <h4>📞 Заинтересовал объект? Звоните!</h4>
                        <div class="modal-phone">+7 918 468 94 71</div>
                        <div class="modal-agent">👩‍💼 Галина Яценко Юрьевна</div>
                    </div>
                </div>
            `;

            document.getElementById('modalOverlay').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal(event) {
            if (event.target === document.getElementById('modalOverlay')) {
                closeModalDirect();
            }
        }

        function closeModalDirect() {
            document.getElementById('modalOverlay').classList.remove('active');
            document.body.style.overflow = '';
        }

        // Закрытие по Escape
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModalDirect();
            }
        });

        // ====== ИНИЦИАЛИЗАЦИЯ ======
        renderCatalog();

        document.getElementById('searchInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                renderCatalog();
            }
        });
    </script>
</body>
</html>
