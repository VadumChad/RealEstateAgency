<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новости | Агентство недвижимости</title>
    <style>
        :root {
            --bg: #f0ede8;
            --bg-gradient: linear-gradient(135deg, #f5f2ed 0%, #e8e3d9 30%, #f0ebe0 60%, #faf7f2 100%);
            --text: #2c2c2c;
            --text-light: #6b6b6b;
            --text-lighter: #999999;
            --gold: #c9a96e;
            --gold-dark: #a68a56;
            --gold-light: #d4b87a;
            --border: rgba(180, 170, 150, 0.25);
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow-md: 0 8px 32px rgba(0,0,0,0.06);
            --shadow-lg: 0 16px 48px rgba(0,0,0,0.08);
            --radius-sm: 14px;
            --radius: 20px;
            --radius-lg: 24px;
            --transition: 0.35s cubic-bezier(0.25, 0.1, 0.25, 1);
            --glass-bg: rgba(255, 255, 255, 0.55);
            --glass-border: rgba(255, 255, 255, 0.6);
            --glass-shadow: 0 8px 32px rgba(0,0,0,0.06);
            --blur: blur(16px);
        }

        .dark-theme {
            --bg: #141414;
            --bg-gradient: linear-gradient(135deg, #1a1a1a 0%, #141414 30%, #1a1a1a 60%, #1e1e1e 100%);
            --text: #e8e8e8;
            --text-light: #a8a8a8;
            --text-lighter: #777777;
            --border: rgba(255,255,255,0.08);
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
            --shadow-md: 0 8px 32px rgba(0,0,0,0.4);
            --shadow-lg: 0 16px 48px rgba(0,0,0,0.5);
            --glass-bg: rgba(40, 40, 40, 0.55);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px rgba(0,0,0,0.4);
            --blur: blur(20px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            transition: all var(--transition);
            position: relative;
            overflow-x: hidden;
        }

        /* ====== ДЕКОРАТИВНЫЙ ФОН ====== */
        .bg-decoration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .bg-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: floatCircle 20s ease-in-out infinite;
        }

        .bg-circle:nth-child(1) {
            width: 500px;
            height: 500px;
            background: var(--gold);
            top: -150px;
            right: -100px;
            animation-delay: 0s;
        }

        .bg-circle:nth-child(2) {
            width: 400px;
            height: 400px;
            background: var(--gold-dark);
            bottom: -100px;
            left: -80px;
            animation-delay: -7s;
            opacity: 0.1;
        }

        .bg-circle:nth-child(3) {
            width: 300px;
            height: 300px;
            background: var(--gold-light);
            top: 50%;
            left: 50%;
            animation-delay: -14s;
            opacity: 0.08;
        }

        .dark-theme .bg-circle {
            opacity: 0.08;
        }

        @keyframes floatCircle {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -40px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(15px, 30px) scale(1.02); }
        }

        /* ====== ШАПКА ====== */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--glass-bg);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border-bottom: 1px solid var(--border);
            transition: all var(--transition);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
            position: relative;
            z-index: 1;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: -0.3px;
        }

        .logo span {
            color: var(--gold);
        }

        .logo-dot {
            width: 8px;
            height: 8px;
            background: #27ae60;
            border-radius: 50%;
            animation: pulse 2.5s infinite;
            display: inline-block;
            margin-left: 2px;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(39,174,96,0.5); }
            50% { box-shadow: 0 0 0 10px rgba(39,174,96,0); }
        }

        .nav-links {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 9px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all var(--transition);
            color: var(--text);
            white-space: nowrap;
            font-family: inherit;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            letter-spacing: -0.2px;
        }

        .btn-glass:hover {
            border-color: var(--gold);
            color: var(--gold);
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(201,169,110,0.2);
        }

        /* ====== ОСНОВНОЙ КОНТЕНТ ====== */
        main {
            padding: 40px 20px 80px;
            position: relative;
            z-index: 1;
        }

        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .page-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--gold);
            margin-bottom: 18px;
            letter-spacing: 0.3px;
        }

        .page-title {
            font-size: 2.6rem;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 8px;
            letter-spacing: -1px;
            line-height: 1.1;
        }

        .page-title span {
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-subtitle {
            color: var(--text-light);
            font-size: 1.05rem;
            font-weight: 400;
        }

        /* ====== ФИЛЬТРЫ ====== */
        .filters-section {
            margin-bottom: 35px;
        }

        .filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .filter-btn {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 11px 22px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all var(--transition);
            color: var(--text);
            font-family: inherit;
            letter-spacing: -0.2px;
            box-shadow: var(--shadow-sm);
        }

        .filter-btn:hover {
            border-color: var(--gold);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(201,169,110,0.15);
        }

        .filter-btn.active {
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 8px 25px rgba(201,169,110,0.35);
            transform: translateY(-1px);
        }

        .dark-theme .filter-btn.active {
            color: #1a1a1a;
        }

        /* ====== СЧЁТЧИК ====== */
        .results-count {
            text-align: center;
            color: var(--text-lighter);
            font-size: 0.85rem;
            margin-bottom: 25px;
            font-weight: 500;
        }

        .results-count strong {
            color: var(--gold);
            font-weight: 700;
        }

        /* ====== СЕТКА НОВОСТЕЙ ====== */
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
        }

        /* ====== GLASSMORPHISM КАРТОЧКА ====== */
        .news-card {
            background: var(--glass-bg);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            overflow: hidden;
            transition: all var(--transition);
            box-shadow: var(--glass-shadow);
            display: flex;
            flex-direction: column;
            position: relative;
            cursor: default;
        }

        .news-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-lg), 0 0 0 1px rgba(201,169,110,0.2);
            border-color: rgba(201,169,110,0.3);
        }

        /* Световая полоса сверху карточки */
        .news-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 10%;
            width: 80%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(201,169,110,0.4), transparent);
            opacity: 0;
            transition: opacity var(--transition);
        }

        .news-card:hover::before {
            opacity: 1;
        }

        .news-card-header {
            padding: 24px 24px 0;
        }

        .news-date {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(201, 169, 110, 0.12);
            color: var(--gold-dark);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
            margin-bottom: 14px;
            letter-spacing: 0.2px;
        }

        .dark-theme .news-date {
            background: rgba(201, 169, 110, 0.15);
            color: var(--gold-light);
        }

        .news-icon {
            font-size: 0.9rem;
        }

        .news-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text);
            line-height: 1.35;
            margin-bottom: 8px;
            letter-spacing: -0.3px;
        }

        .news-card-body {
            padding: 0 24px 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .news-text {
            color: var(--text-light);
            font-size: 0.93rem;
            line-height: 1.65;
            flex: 1;
            margin-bottom: 14px;
        }

        .news-read-more {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--gold);
            font-weight: 600;
            font-size: 0.88rem;
            cursor: pointer;
            transition: all var(--transition);
            background: none;
            border: none;
            padding: 0;
            font-family: inherit;
            align-self: flex-start;
            letter-spacing: -0.2px;
        }

        .news-read-more:hover {
            color: var(--gold-dark);
            gap: 10px;
        }

        .news-read-more-arrow {
            transition: transform var(--transition);
            display: inline-block;
        }

        .news-read-more:hover .news-read-more-arrow {
            transform: translateX(4px);
        }

        .news-card-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.78rem;
            color: var(--text-lighter);
            font-weight: 500;
        }

        .news-tag {
            background: rgba(201, 169, 110, 0.08);
            color: var(--gold-dark);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        /* ====== МОДАЛЬНОЕ ОКНО ====== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.92) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal {
            background: var(--glass-bg);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 600px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 30px 70px rgba(0,0,0,0.25);
            animation: modalIn 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
            position: relative;
            padding: 35px 30px;
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.1rem;
            color: var(--text);
            transition: all var(--transition);
            z-index: 2;
        }

        .modal-close:hover {
            background: #e74c3c;
            color: #fff;
            border-color: #e74c3c;
            transform: rotate(90deg);
        }

        .modal-date {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(201, 169, 110, 0.12);
            color: var(--gold-dark);
            padding: 7px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .modal-title {
            font-size: 1.7rem;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 18px;
            line-height: 1.3;
            letter-spacing: -0.5px;
        }

        .modal-text {
            color: var(--text-light);
            font-size: 1rem;
            line-height: 1.75;
        }

        /* ====== ЗАГЛУШКА ====== */
        .empty-state {
            text-align: center;
            padding: 100px 20px;
            color: var(--text-light);
            grid-column: 1 / -1;
            background: var(--glass-bg);
            backdrop-filter: var(--blur);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            box-shadow: var(--glass-shadow);
        }

        .empty-state-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            opacity: 0.6;
            filter: grayscale(0.3);
        }

        .empty-state h2 {
            font-size: 1.5rem;
            color: var(--text);
            margin-bottom: 10px;
            font-weight: 700;
        }

        .empty-state p {
            font-size: 1rem;
            max-width: 400px;
            margin: 0 auto;
            line-height: 1.6;
            color: var(--text-lighter);
        }

        /* ====== СКРОЛЛБАР ====== */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--gold); }

        /* ====== АДАПТИВ ====== */
        @media (max-width: 600px) {
            .news-grid {
                grid-template-columns: 1fr;
                gap: 18px;
            }

            .page-title {
                font-size: 1.8rem;
            }

            .modal {
                padding: 25px 20px;
                max-width: 95vw;
            }

            .modal-title {
                font-size: 1.3rem;
            }

            .filter-btn {
                padding: 9px 16px;
                font-size: 0.8rem;
            }

            .news-card-header,
            .news-card-body {
                padding-left: 20px;
                padding-right: 20px;
            }
            .news-card-header { padding-top: 20px; }
            .news-card-body { padding-bottom: 16px; }
            .news-card-footer { padding: 14px 20px; }
        }
    </style>
</head>
<body>

    <!-- ====== ДЕКОРАТИВНЫЙ ФОН ====== -->
    <div class="bg-decoration">
        <div class="bg-circle"></div>
        <div class="bg-circle"></div>
        <div class="bg-circle"></div>
    </div>

    <!-- ====== ШАПКА ====== -->
    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo">
                    🏠 <span>Агентство недвижимости</span><span class="logo-dot"></span>
                </a>
                <div class="nav-links">
                    <a href="index.html" class="btn-glass">← На главную</a>
                    <button class="btn-glass" onclick="toggleTheme()" id="themeBtn">🌙 Тёмная</button>
                </div>
            </nav>
        </div>
    </header>

    <!-- ====== ОСНОВНОЙ КОНТЕНТ ====== -->
    <main>
        <div class="container">
            <div class="page-header">
                <div class="page-badge">📰 Актуальное</div>
                <h1 class="page-title"><span>Новости</span> рынка</h1>
                <p class="page-subtitle">Свежие события, аналитика и новые объекты недвижимости</p>
            </div>

            <!-- Фильтры по годам -->
            <div class="filters-section">
                <div class="filters" id="yearFilters">
                    <button class="filter-btn active" onclick="setFilter('all', this)">📋 Все</button>
                </div>
            </div>

            <!-- Счётчик -->
            <div class="results-count" id="resultsCount"></div>

            <!-- Сетка новостей -->
            <div class="news-grid" id="newsGrid"></div>
        </div>
    </main>

    <!-- ====== МОДАЛЬНОЕ ОКНО ====== -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal" id="modalContent" onclick="event.stopPropagation()"></div>
    </div>

    <script>
        // ====== ТЁМНАЯ ТЕМА ======
        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            const btn = document.getElementById('themeBtn');
            const isDark = document.body.classList.contains('dark-theme');
            btn.textContent = isDark ? '☀️ Светлая' : '🌙 Тёмная';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-theme');
            document.getElementById('themeBtn').textContent = '☀️ Светлая';
        }

        // ====== ЗАГРУЗКА ДАННЫХ ======
        function loadNews() {
            const stored = localStorage.getItem('realtorData');
            if (stored) {
                try {
                    const data = JSON.parse(stored);
                    return data.news || [];
                } catch (e) {
                    return [];
                }
            }
            return [];
        }

        // ====== ФОРМАТИРОВАНИЕ ДАТЫ ======
        function formatDate(dateString) {
            if (!dateString) return 'Дата не указана';
            const months = [
                'января', 'февраля', 'марта', 'апреля', 'мая', 'июня',
                'июля', 'августа', 'сентября', 'октября', 'ноября', 'декабря'
            ];
            try {
                const date = new Date(dateString);
                if (isNaN(date.getTime())) return dateString;
                return `${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear()}`;
            } catch (e) {
                return dateString;
            }
        }

        // ====== ОБРЕЗКА ТЕКСТА ======
        function truncateText(text, maxLength = 200) {
            if (!text) return '';
            if (text.length <= maxLength) return text;
            return text.substring(0, maxLength).trim() + '...';
        }

        // ====== ПОЛУЧЕНИЕ ГОДА ИЗ ДАТЫ ======
        function getYear(dateString) {
            if (!dateString) return null;
            try {
                const date = new Date(dateString);
                if (isNaN(date.getTime())) return null;
                return date.getFullYear();
            } catch (e) {
                return null;
            }
        }

        // ====== ФИЛЬТРАЦИЯ ======
        let currentFilter = 'all';

        function setFilter(filter, btn) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderNews();
        }

        // ====== ГЕНЕРАЦИЯ КНОПОК ФИЛЬТРА ======
        function generateYearFilters(news) {
            const years = new Set();
            news.forEach(item => {
                const year = getYear(item.date);
                if (year) years.add(year);
            });

            const sortedYears = [...years].sort((a, b) => b - a);
            const filterContainer = document.getElementById('yearFilters');

            filterContainer.innerHTML = '<button class="filter-btn active" onclick="setFilter(\'all\', this)">📋 Все</button>';

            sortedYears.forEach(year => {
                filterContainer.innerHTML += `
                    <button class="filter-btn" onclick="setFilter('${year}', this)">📅 ${year}</button>`;
            });
        }

        // ====== РЕНДЕР НОВОСТЕЙ ======
        function renderNews() {
            const news = loadNews();
            const grid = document.getElementById('newsGrid');
            const countEl = document.getElementById('resultsCount');

            // Генерируем фильтры
            generateYearFilters(news);

            // Сортируем по дате (сначала новые)
            const sortedNews = [...news].sort((a, b) => {
                return new Date(b.date) - new Date(a.date);
            });

            // Фильтруем
            let filtered = sortedNews;
            if (currentFilter !== 'all') {
                filtered = sortedNews.filter(item => {
                    const year = getYear(item.date);
                    return year && year.toString() === currentFilter.toString();
                });
            }

            // Обновляем счётчик
            const filterLabel = currentFilter === 'all' ? 'всех лет' : `за ${currentFilter} год`;
            countEl.innerHTML = `Найдено: <strong>${filtered.length}</strong> ${filtered.length === 1 ? 'новость' : filtered.length >= 2 && filtered.length <= 4 ? 'новости' : 'новостей'} ${filterLabel}`;

            // Заглушка
            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <h2>Пока нет новостей</h2>
                        <p>${currentFilter === 'all' ? 'Новости рынка недвижимости появятся здесь после добавления в админ-панели.' : `Новостей за ${currentFilter} год пока нет.`}</p>
                    </div>`;
                return;
            }

            // Рендер карточек
            grid.innerHTML = filtered.map(item => {
                const truncatedText = truncateText(item.text, 200);
                const hasMore = item.text && item.text.length > 200;
                const year = getYear(item.date);

                return `
                    <div class="news-card">
                        <div class="news-card-header">
                            <div class="news-date">
                                <span class="news-icon">📅</span> ${formatDate(item.date)}
                            </div>
                            <h3 class="news-title">${item.title || 'Без заголовка'}</h3>
                        </div>
                        <div class="news-card-body">
                            <p class="news-text">${truncatedText}</p>
                            ${hasMore ? `
                                <button class="news-read-more" onclick='openNewsModal(${JSON.stringify(item).replace(/'/g, "&#39;")})'>
                                    Читать полностью <span class="news-read-more-arrow">→</span>
                                </button>
                            ` : ''}
                        </div>
                        <div class="news-card-footer">
                            <span>🏠 Агентство недвижимости</span>
                            ${year ? `<span class="news-tag">${year}</span>` : ''}
                        </div>
                    </div>`;
            }).join('');
        }

        // ====== МОДАЛЬНОЕ ОКНО ======
        function openNewsModal(item) {
            const modalContent = document.getElementById('modalContent');

            modalContent.innerHTML = `
                <span class="modal-close" onclick="closeModalDirect()">✕</span>
                <div class="modal-date">
                    <span>📅</span> ${formatDate(item.date)}
                </div>
                <h2 class="modal-title">${item.title || 'Без заголовка'}</h2>
                <div class="modal-text">${(item.text || 'Текст новости отсутствует.').replace(/\n/g, '<br>')}</div>
            `;

            document.getElementById('modalOverlay').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal(event) {
            if (event.target === document.getElementById('modalOverlay')) {
                closeModalDirect();
            }
        }

        function closeModalDirect() {
            document.getElementById('modalOverlay').classList.remove('active');
            document.body.style.overflow = '';
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModalDirect();
        });

        // ====== ИНИЦИАЛИЗАЦИЯ ======
        renderNews();
    </script>
</body>
</html>
