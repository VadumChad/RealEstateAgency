<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Горячие предложения | Агентство недвижимости</title>
    <style>
        :root {
            --bg: #060606;
            --card: #0f0f0f;
            --card-alt: #141414;
            --text: #e0e0e0;
            --text-light: #a0a0a0;
            --text-lighter: #666;
            --gold: #c9a96e;
            --gold-dark: #a68a56;
            --gold-light: #d4b87a;
            --gold-pale: rgba(201, 169, 110, 0.06);
            --gold-border: rgba(201, 169, 110, 0.18);
            --border: #1c1c1c;
            --shadow: 0 4px 25px rgba(0,0,0,0.5);
            --shadow-hover: 0 16px 45px rgba(0,0,0,0.7);
            --radius: 16px;
            --radius-lg: 22px;
            --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            --red: #e74c3c;
            --green: #2ecc71;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .bg-decoration { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .bg-orb { position: absolute; border-radius: 50%; filter: blur(180px); opacity: 0.03; }
        .bg-orb:nth-child(1) { width: 900px; height: 900px; background: var(--red); top: -30%; right: -25%; }
        .bg-orb:nth-child(2) { width: 600px; height: 600px; background: var(--gold-dark); bottom: -20%; left: -20%; opacity: 0.02; }

        header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(6,6,6,0.88); backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border-bottom: 1px solid var(--border);
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; flex-wrap: wrap; gap: 15px; }
        .logo { font-size: 1.3rem; font-weight: 700; color: var(--text); text-decoration: none; display: flex; align-items: center; gap: 8px; letter-spacing: -0.3px; }
        .logo span { color: var(--gold); }
        .logo-dot { width: 8px; height: 8px; background: #27ae60; border-radius: 50%; animation: pulse 2.5s infinite; display: inline-block; margin-left: 2px; }
        @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(39,174,96,0.5)} 50%{box-shadow:0 0 0 14px rgba(39,174,96,0)} }
        .nav-links { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .btn-outline {
            background: transparent; border: 1.5px solid var(--border); padding: 9px 18px;
            border-radius: 30px; cursor: pointer; font-size: 0.85rem; font-weight: 600;
            transition: all var(--transition); color: var(--text-light); white-space: nowrap;
            font-family: inherit; text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
        }
        .btn-outline:hover { border-color: var(--gold); color: var(--gold); }

        main { padding: 40px 20px 80px; position: relative; z-index: 1; }
        .page-header { text-align: center; margin-bottom: 45px; }
        .page-badge {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(231,76,60,0.1); border: 1px solid rgba(231,76,60,0.25);
            padding: 7px 18px; border-radius: 30px; font-size: 0.82rem;
            font-weight: 600; color: var(--red); margin-bottom: 16px; letter-spacing: 0.4px;
        }
        .page-title { font-size: 2.8rem; font-weight: 800; color: var(--text); letter-spacing: -1px; line-height: 1.1; }
        .page-title span {
            background: linear-gradient(135deg, var(--red) 0%, #f39c12 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .page-subtitle { color: var(--text-light); font-size: 1.1rem; margin-top: 6px; }

        /* Сетка карточек */
        .offers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }
        .offer-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            transition: all var(--transition);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            opacity: 0;
            transform: translateY(30px);
            animation: cardReveal 0.5s ease forwards;
        }
        @keyframes cardReveal { to { opacity: 1; transform: translateY(0); } }
        .offer-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-hover); border-color: rgba(231,76,60,0.3); }
        .offer-photo {
            width: 100%; height: 200px;
            background: linear-gradient(135deg, #1a1a1a 0%, #0f0f0f 50%, #181818 100%);
            display: flex; align-items: center; justify-content: center;
            font-size: 3.5rem; position: relative; overflow: hidden;
        }
        .offer-photo img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; }
        .offer-card:hover .offer-photo img { transform: scale(1.05); }
        .offer-badge {
            position: absolute; top: 14px; right: 14px;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: #fff; padding: 6px 14px; border-radius: 20px;
            font-size: 0.75rem; font-weight: 700; z-index: 2;
            letter-spacing: 0.5px; box-shadow: 0 4px 15px rgba(231,76,60,0.4);
            animation: hotPulse 2s ease-in-out infinite;
        }
        @keyframes hotPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
        .offer-body { padding: 20px 22px 22px; flex: 1; display: flex; flex-direction: column; }
        .offer-name { font-size: 1.15rem; font-weight: 700; color: var(--text); margin-bottom: 6px; }
        .offer-price { font-size: 1.5rem; font-weight: 800; color: var(--gold); margin-bottom: 8px; }
        .offer-desc { font-size: 0.85rem; color: var(--text-light); line-height: 1.5; flex: 1; margin-bottom: 14px; }
        .offer-btn {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: #fff; padding: 12px 0; border-radius: 14px;
            font-weight: 700; font-size: 0.9rem; border: none;
            cursor: pointer; transition: all 0.3s ease; font-family: inherit;
        }
        .offer-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(231,76,60,0.4); }

        /* Телефоны внизу карточки */
        .offer-contacts {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .contact-phone {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: var(--text-light);
        }
        .contact-phone strong {
            color: var(--gold);
            font-weight: 600;
        }

        /* МОДАЛЬНОЕ ОКНО */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--card);
            border: 1px solid var(--gold-border);
            border-radius: var(--radius-lg);
            width: 100%; max-width: 550px;
            max-height: 90vh; overflow-y: auto;
            box-shadow: 0 35px 80px rgba(0,0,0,0.95);
            animation: modalIn 0.4s ease; padding: 30px; position: relative;
        }
        @keyframes modalIn { from{opacity:0;transform:scale(0.9) translateY(20px)} to{opacity:1;transform:scale(1) translateY(0)} }
        .modal-close {
            position: absolute; top: 14px; right: 14px;
            background: var(--card-alt); border: 1px solid var(--border);
            width: 34px; height: 34px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--text-light); transition: var(--transition);
            font-size: 1rem;
        }
        .modal-close:hover { background: #e74c3c; color: #fff; }
        .modal-photo {
            width: 100%; height: 200px;
            border-radius: var(--radius); overflow: hidden;
            margin-bottom: 16px; background: #111;
            display: flex; align-items: center; justify-content: center;
        }
        .modal-photo img { width: 100%; height: 100%; object-fit: cover; }
        .modal-title { font-size: 1.5rem; font-weight: 800; color: var(--text); margin-bottom: 4px; }
        .modal-price { font-size: 1.3rem; font-weight: 700; color: var(--gold); margin-bottom: 12px; }
        .modal-desc { color: var(--text-light); font-size: 0.95rem; line-height: 1.6; }

        /* Заглушка */
        .empty-state {
            text-align: center; padding: 80px 20px;
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius-lg); box-shadow: var(--shadow);
        }
        .empty-icon { font-size: 4rem; margin-bottom: 16px; opacity: 0.5; }
        .empty-title { font-size: 1.3rem; font-weight: 700; color: var(--text); margin-bottom: 6px; }
        .empty-desc { color: var(--text-light); font-size: 0.9rem; }

        @media (max-width: 600px) {
            .page-title { font-size: 2rem; }
            .offers-grid { grid-template-columns: 1fr; gap: 16px; }
            .offer-photo { height: 160px; font-size: 2.5rem; }
            .modal { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="bg-decoration">
        <div class="bg-orb"></div>
        <div class="bg-orb"></div>
    </div>

    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo">Агентство <span>недвижимости</span><span class="logo-dot"></span></a>
                <div class="nav-links">
                    <a href="index.html" class="btn-outline">← На главную</a>
                    <a href="catalog.html" class="btn-outline">Каталог</a>
                </div>
            </nav>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="page-header">
                <div class="page-badge">🔥 Ограниченный срок</div>
                <h1 class="page-title"><span>Горячие</span> предложения</h1>
                <p class="page-subtitle">Лучшие объекты по специальным ценам — успейте купить</p>
            </div>

            <div id="offersGrid"></div>
        </div>
    </main>

    <!-- МОДАЛЬНОЕ ОКНО -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal" id="modalContent" onclick="event.stopPropagation()"></div>
    </div>

    <script>
        function loadHotOffers() {
            const stored = localStorage.getItem('realtorData');
            if (stored) {
                try {
                    const data = JSON.parse(stored);
                    return data.hotOffers || [];
                } catch(e) { return []; }
            }
            return [];
        }

        function renderOffers() {
            const offers = loadHotOffers();
            const grid = document.getElementById('offersGrid');

            if (offers.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <div class="empty-icon">📭</div>
                        <div class="empty-title">Пока нет горячих предложений</div>
                        <div class="empty-desc">Загляните позже — мы постоянно обновляем список акций и скидок</div>
                    </div>`;
                return;
            }

            grid.className = 'offers-grid';
            grid.innerHTML = offers.map((item, i) => `
                <div class="offer-card" style="animation-delay: ${i * 0.08}s">
                    <div class="offer-photo">
                        ${item.photo ? `<img src="${item.photo}" alt="${escapeHtml(item.title)}" loading="lazy" onerror="this.style.display='none';this.parentElement.innerHTML='<span style=font-size:3.5rem>🏠</span>'">` : '🏠'}
                        <span class="offer-badge">🔥 Акция</span>
                    </div>
                    <div class="offer-body">
                        <h3 class="offer-name">${escapeHtml(item.title) || 'Без названия'}</h3>
                        <div class="offer-price">${escapeHtml(item.price) || 'Цена по запросу'}</div>
                        <p class="offer-desc">${escapeHtml(item.desc) || 'Описание отсутствует'}</p>
                        <button class="offer-btn" onclick="openOfferModal('${item.id}')">Подробнее →</button>
                        
                        <div class="offer-contacts">
                            <div class="contact-phone">📞 <strong>Галина:</strong> +7 918 468 94 71</div>
                            <div class="contact-phone">📞 <strong>Татьяна:</strong> +7 988 363 43 47</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // ====== МОДАЛЬНОЕ ОКНО ДЛЯ ОБЪЕКТА ======
        function openOfferModal(id) {
            const offers = loadHotOffers();
            const item = offers.find(o => o.id === id);
            if (!item) return;

            const modal = document.getElementById('modalContent');
            modal.innerHTML = `
                <span class="modal-close" onclick="closeModalDirect()">✕</span>
                <div class="modal-photo">
                    ${item.photo ? `<img src="${item.photo}" alt="${escapeHtml(item.title)}">` : '<span style="font-size:3rem;">🏠</span>'}
                </div>
                <div class="modal-title">${escapeHtml(item.title) || 'Без названия'}</div>
                <div class="modal-price">${escapeHtml(item.price) || 'Цена по запросу'}</div>
                <p class="modal-desc">${escapeHtml(item.desc) || 'Описание отсутствует'}</p>
            `;

            document.getElementById('modalOverlay').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal(e) {
            if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
        }
        function closeModalDirect() {
            document.getElementById('modalOverlay').classList.remove('active');
            document.body.style.overflow = '';
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        renderOffers();
    </script>
</body>
</html>
