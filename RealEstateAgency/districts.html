<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Районы Краснодара | Агентство недвижимости</title>
    <style>
        :root {
            --bg: #050505;
            --card: #0d0d0d;
            --card-alt: #111;
            --text: #e8e8e8;
            --text-light: #9a9a9a;
            --text-lighter: #606060;
            --gold: #c9a96e;
            --gold-dark: #a68a56;
            --gold-light: #d4b87a;
            --gold-pale: rgba(201,169,110,0.06);
            --gold-border: rgba(201,169,110,0.2);
            --gold-glow: rgba(201,169,110,0.5);
            --green: #2ecc71;
            --red: #e74c3c;
            --orange: #f39c12;
            --border: #1a1a1a;
            --shadow: 0 8px 40px rgba(0,0,0,0.8);
            --shadow-hover: 0 20px 55px rgba(0,0,0,0.9);
            --radius: 14px;
            --radius-lg: 22px;
            --transition: 0.4s cubic-bezier(0.4,0,0.2,1);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior:smooth; }
        body {
            font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
            background:var(--bg); color:var(--text); line-height:1.5;
            min-height:100vh; overflow-x:hidden; -webkit-font-smoothing:antialiased;
        }
        .bg-decoration { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }
        .bg-orb { position:absolute; border-radius:50%; filter:blur(200px); opacity:0.03; }
        .bg-orb:nth-child(1) { width:1200px; height:1200px; background:var(--gold); top:-40%; right:-35%; }
        .bg-orb:nth-child(2) { width:800px; height:800px; background:var(--gold-dark); bottom:-30%; left:-25%; opacity:0.02; }
        header {
            position:sticky; top:0; z-index:100;
            background:rgba(5,5,5,0.9); backdrop-filter:blur(35px);
            border-bottom:1px solid var(--border);
        }
        .container { max-width:1400px; margin:0 auto; padding:0 20px; position:relative; z-index:1; }
        nav { display:flex; justify-content:space-between; align-items:center; padding:16px 0; flex-wrap:wrap; gap:15px; }
        .logo { font-size:1.3rem; font-weight:700; color:var(--text); text-decoration:none; display:flex; align-items:center; gap:8px; }
        .logo span { color:var(--gold); }
        .nav-links { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
        .btn-outline {
            background:transparent; border:1.5px solid var(--border); padding:9px 18px;
            border-radius:30px; cursor:pointer; font-size:0.85rem; font-weight:600;
            color:var(--text-light); text-decoration:none; transition:var(--transition);
            display:inline-flex; align-items:center; gap:6px; font-family:inherit;
        }
        .btn-outline:hover { border-color:var(--gold); color:var(--gold); }
        .btn-gold {
            background:linear-gradient(135deg,var(--gold),var(--gold-dark));
            color:#050505; border:none; padding:10px 22px; border-radius:30px;
            font-weight:700; cursor:pointer; font-size:0.85rem; text-decoration:none;
            transition:var(--transition); display:inline-flex; align-items:center; gap:6px;
            font-family:inherit;
        }
        .btn-gold:hover { transform:translateY(-2px); box-shadow:0 12px 30px rgba(201,169,110,0.3); }
        main { padding:30px 20px 80px; position:relative; z-index:1; }
        .page-header { text-align:center; margin-bottom:35px; }
        .page-badge {
            display:inline-flex; align-items:center; gap:8px;
            background:var(--gold-pale); border:1px solid var(--gold-border);
            padding:7px 18px; border-radius:30px; font-size:0.8rem;
            font-weight:600; color:var(--gold); margin-bottom:14px; letter-spacing:0.4px;
        }
        .page-title { font-size:2.8rem; font-weight:800; letter-spacing:-1px; }
        .page-title span {
            background:linear-gradient(135deg,var(--gold),var(--gold-light),var(--gold-dark));
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
        }
        .page-subtitle { color:var(--text-light); font-size:1rem; }

        /* ЯНДЕКС.КАРТА */
        .map-section {
            background:var(--card);
            border:1px solid var(--border);
            border-radius:var(--radius-lg);
            padding:8px;
            margin-bottom:35px;
            box-shadow:var(--shadow);
        }
        .map-container {
            width:100%;
            height:500px;
            border-radius:var(--radius);
            overflow:hidden;
            background:#0a0a0a;
        }
        .map-container iframe {
            width:100%;
            height:100%;
            border:none;
        }
        #yandexMap {
            width:100%;
            height:100%;
            background:#0a0a0a;
        }

        /* СЕТКА КАРТОЧЕК */
        .districts-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:16px; }
        .district-card {
            background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
            overflow:hidden; cursor:pointer; transition:var(--transition); box-shadow:0 2px 15px rgba(0,0,0,0.5);
            animation:reveal 0.5s ease forwards; opacity:0; transform:translateY(30px);
        }
        @keyframes reveal { to{opacity:1;transform:translateY(0)} }
        .district-card:hover { transform:translateY(-5px); box-shadow:var(--shadow-hover); border-color:var(--gold-border); }
        .district-photo {
            width:100%; height:160px; background:linear-gradient(135deg,#111,#0a0a0a,#181818);
            display:flex; align-items:center; justify-content:center; position:relative;
        }
        .district-photo img { width:100%; height:100%; object-fit:cover; }
        .photo-placeholder { color:var(--text-lighter); font-size:0.8rem; display:flex; flex-direction:column; align-items:center; gap:8px; }
        .photo-placeholder-icon { width:40px; height:40px; border-radius:50%; background:rgba(255,255,255,0.02); border:1px dashed #2a2a2a; display:flex; align-items:center; justify-content:center; font-size:1.2rem; }
        .district-body { padding:16px 18px; }
        .district-name { font-weight:700; font-size:1rem; margin-bottom:6px; }
        .district-stats { display:flex; gap:10px; flex-wrap:wrap; font-size:0.72rem; color:var(--text-light); }
        .stat-badge { display:flex; align-items:center; gap:4px; background:var(--card-alt); padding:4px 10px; border-radius:10px; }

        /* МОДАЛЬНОЕ ОКНО */
        .modal-overlay {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.85); backdrop-filter:blur(12px);
            z-index:200; align-items:center; justify-content:center; padding:15px;
        }
        .modal-overlay.active { display:flex; }
        .modal {
            background:var(--card); border:1px solid var(--gold-border); border-radius:var(--radius-lg);
            width:100%; max-width:650px; max-height:90vh; overflow-y:auto;
            box-shadow:0 35px 80px rgba(0,0,0,0.95);
            animation:modalIn 0.4s ease; padding:25px; position:relative;
        }
        @keyframes modalIn { from{opacity:0;transform:scale(0.9) translateY(20px)} to{opacity:1;transform:scale(1) translateY(0)} }
        .modal-close {
            position:absolute; top:12px; right:12px; background:var(--card-alt);
            border:1px solid var(--border); width:32px; height:32px; border-radius:50%;
            display:flex; align-items:center; justify-content:center; cursor:pointer;
            color:var(--text-light); transition:var(--transition); font-size:1rem;
        }
        .modal-close:hover { background:#e74c3c; color:#fff; }
        .modal-photo { width:100%; height:200px; border-radius:var(--radius); overflow:hidden; margin-bottom:16px; background:#111; display:flex; align-items:center; justify-content:center; }
        .modal-photo img { width:100%; height:100%; object-fit:cover; }
        .modal-title { font-size:1.5rem; font-weight:800; margin-bottom:4px; }
        .modal-desc { color:var(--text-light); font-size:0.9rem; margin-bottom:14px; line-height:1.5; }
        .metric-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
        .metric {
            background:var(--card-alt); border-radius:10px; padding:10px 12px;
            border:1px solid var(--border);
        }
        .metric-label { font-size:0.7rem; color:var(--text-lighter); margin-bottom:3px; }
        .metric-value { font-size:1.1rem; font-weight:700; }
        .metric-bar { height:4px; border-radius:2px; margin-top:4px; background:#1a1a1a; overflow:hidden; }
        .metric-fill { height:100%; border-radius:2px; transition:width 0.6s ease; }
        .infra-grid { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:14px; }
        .infra-item { text-align:center; background:var(--card-alt); padding:10px 14px; border-radius:10px; border:1px solid var(--border); min-width:60px; }
        .infra-icon { font-size:1.4rem; margin-bottom:2px; }
        .infra-value { font-weight:700; font-size:0.9rem; }
        .infra-label { font-size:0.65rem; color:var(--text-lighter); }
        .modal-rating { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
        .rating-number { font-size:2rem; font-weight:800; color:var(--gold); }
        .rating-stars { color:var(--gold); font-size:1.1rem; }

        @media (max-width:768px) {
            .map-container { height:350px; }
            .page-title { font-size:2rem; }
            .metric-grid { grid-template-columns:1fr; }
            .districts-grid { grid-template-columns:1fr; }
        }
    </style>
</head>
<body>
    <div class="bg-decoration"><div class="bg-orb"></div><div class="bg-orb"></div></div>
    <header>
        <div class="container"><nav><a href="index.html" class="logo">Агентство <span>недвижимости</span></a><div class="nav-links"><a href="index.html" class="btn-outline">← На главную</a><a href="catalog.html" class="btn-gold">Каталог</a></div></nav></div>
    </header>
    <main>
        <div class="container">
            <div class="page-header"><div class="page-badge">📍 Районы города</div><h1 class="page-title">Районы <span>Краснодара</span></h1><p class="page-subtitle">Подробная информация о каждом районе</p></div>

            <!-- ЯНДЕКС.КАРТА -->
            <div class="map-section">
                <div class="map-container">
                    <div id="yandexMap"></div>
                </div>
            </div>

            <!-- КАРТОЧКИ -->
            <div class="districts-grid" id="districtsGrid"></div>
        </div>
    </main>

    <!-- МОДАЛЬНОЕ ОКНО -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal" id="modalContent" onclick="event.stopPropagation()"></div>
    </div>

    

    <script>
        // ====== ВСТАВЬ СВОЙ API-КЛЮЧ ЗДЕСЬ ======
        const YANDEX_API_KEY = '5e7bd78a-4d42-4234-9463-93dd2e09ba15';

        // ====== ДАННЫЕ РАЙОНОВ ======
                const districts = [
            { id:'central', name:'Центральный', desc:'Исторический и деловой центр. Престижные улицы, театры, бутики, рестораны. Самая высокая концентрация бизнеса и культурных объектов.',
              rating:9, quality:92, crime:12, noise:85, liquidity:98, schools:14, kindergartens:18, stops:35, stadiums:3, photo:'', coords:[45.0375, 38.9807] },
            { id:'festivalny', name:'Фестивальный', desc:'Современный микрорайон с новой застройкой. Широкие проспекты, фитнес-центры, детские площадки. Популярен у молодых семей.',
              rating:8, quality:85, crime:8, noise:55, liquidity:90, schools:10, kindergartens:14, stops:22, stadiums:2, photo:'', coords:[45.0785, 38.9310] },
            { id:'gidrostroiteley', name:'Гидростроителей', desc:'Уютный район у реки Кубань. Тихие улицы, набережная, хорошая экология. Прекрасный выбор для спокойной жизни.',
              rating:7, quality:78, crime:15, noise:30, liquidity:72, schools:6, kindergartens:9, stops:14, stadiums:1, photo:'', coords:[45.0110, 38.9880] },
            { id:'prikubansky', name:'Прикубанский', desc:'Зелёный и просторный округ. Частные дома, коттеджные посёлки, близость к природе. Идеально для семей с детьми.',
              rating:8, quality:80, crime:10, noise:25, liquidity:75, schools:8, kindergartens:11, stops:16, stadiums:1, photo:'', coords:[45.0820, 38.9490] },
            { id:'karasunsky', name:'Карасунский', desc:'Крупный промышленный и жилой округ. Доступные цены, много социальных объектов, активная застройка.',
              rating:6, quality:65, crime:22, noise:60, liquidity:68, schools:12, kindergartens:15, stops:28, stadiums:2, photo:'', coords:[45.0200, 39.0280] },
            { id:'zapadny', name:'Западный', desc:'Спальный район с развитой инфраструктурой. Много парков, торговых центров, хорошая транспортная доступность.',
              rating:7, quality:72, crime:14, noise:50, liquidity:78, schools:9, kindergartens:12, stops:20, stadiums:1, photo:'', coords:[45.0410, 38.9510] },
            { id:'yubileyny', name:'Юбилейный', desc:'Динамично развивающийся микрорайон с современной инфраструктурой. Много новых ЖК и магазинов.',
              rating:7, quality:74, crime:11, noise:45, liquidity:80, schools:7, kindergartens:10, stops:18, stadiums:1, photo:'', coords:[45.0530, 38.9720] },
            { id:'pashkovsky', name:'Пашковский', desc:'Крупный жилой массив с частным сектором и многоэтажками. Хорошая транспортная развязка.',
              rating:6, quality:60, crime:25, noise:55, liquidity:62, schools:11, kindergartens:13, stops:24, stadiums:2, photo:'', coords:[45.0330, 39.0620] },
            { id:'yuzhny', name:'Южный', desc:'Южная часть города с активной застройкой. Много новых проектов и доступного жилья.',
              rating:6, quality:58, crime:28, noise:50, liquidity:60, schools:10, kindergartens:11, stops:19, stadiums:1, photo:'', coords:[45.0120, 39.0020] },
            { id:'enem', name:'Энем', desc:'Пригород Краснодара с доступными ценами и хорошей экологией. Популярен у тех, кто хочет свой дом.',
              rating:5, quality:55, crime:20, noise:20, liquidity:50, schools:5, kindergartens:6, stops:10, stadiums:1, photo:'', coords:[44.9830, 39.0420] }
        ];

        // ====== РЕНДЕР КАРТОЧЕК ======
        function renderCards() {
            const grid = document.getElementById('districtsGrid');
            grid.innerHTML = districts.map((d, i) => {
                return `
                <div class="district-card" id="card-${d.id}" style="animation-delay:${i*0.04}s" onclick="openModal('${d.id}')">
                    <div class="district-photo">
                        ${d.photo ? `<img src="${d.photo}" alt="${d.name}">` :
                        `<div class="photo-placeholder"><div class="photo-placeholder-icon">🖼️</div><span>Фото района</span></div>`}
                    </div>
                    <div class="district-body">
                        <div class="district-name">${d.name}</div>
                        <div class="district-stats">
                            <span class="stat-badge">⭐ ${d.rating}/10</span>
                            <span class="stat-badge">🏠 ${d.liquidity}% ликв.</span>
                            <span class="stat-badge">📊 ${d.quality}% качество</span>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        // ====== МОДАЛЬНОЕ ОКНО ======
        function openModal(id) {
            const d = districts.find(x => x.id === id);
            if (!d) return;
            const modal = document.getElementById('modalContent');
            modal.innerHTML = `
                <span class="modal-close" onclick="closeModalDirect()">✕</span>
                <div class="modal-photo">
                    ${d.photo ? `<img src="${d.photo}" alt="${d.name}">` :
                    `<div class="photo-placeholder"><div class="photo-placeholder-icon">🖼️</div><span>Фото района</span></div>`}
                </div>
                <div class="modal-title">${d.name}</div>
                <div class="modal-rating">
                    <span class="rating-number">${d.rating}/10</span>
                    <span class="rating-stars">${'★'.repeat(Math.round(d.rating/2))}${'☆'.repeat(5-Math.round(d.rating/2))}</span>
                </div>
                <p class="modal-desc">${d.desc}</p>
                <div class="metric-grid">
                    <div class="metric"><div class="metric-label">Качество жизни</div><div class="metric-value">${d.quality}%</div><div class="metric-bar"><div class="metric-fill" style="width:${d.quality}%;background:var(--green)"></div></div></div>
                    <div class="metric"><div class="metric-label">Преступность</div><div class="metric-value">${d.crime}%</div><div class="metric-bar"><div class="metric-fill" style="width:${d.crime}%;background:var(--red)"></div></div></div>
                    <div class="metric"><div class="metric-label">Шум / Тишина</div><div class="metric-value">${d.noise}%</div><div class="metric-bar"><div class="metric-fill" style="width:${d.noise}%;background:var(--orange)"></div></div></div>
                    <div class="metric"><div class="metric-label">Ликвидность</div><div class="metric-value">${d.liquidity}%</div><div class="metric-bar"><div class="metric-fill" style="width:${d.liquidity}%;background:var(--gold)"></div></div></div>
                </div>
                <h4 style="margin-bottom:8px;color:var(--text-light);">🏗️ Инфраструктура</h4>
                <div class="infra-grid">
                    <div class="infra-item"><div class="infra-icon">🏫</div><div class="infra-value">${d.schools}</div><div class="infra-label">Школы</div></div>
                    <div class="infra-item"><div class="infra-icon">🧸</div><div class="infra-value">${d.kindergartens}</div><div class="infra-label">Садики</div></div>
                    <div class="infra-item"><div class="infra-icon">🚏</div><div class="infra-value">${d.stops}</div><div class="infra-label">Остановки</div></div>
                    <div class="infra-item"><div class="infra-icon">🏟️</div><div class="infra-value">${d.stadiums}</div><div class="infra-label">Стадионы</div></div>
                </div>
            `;
            document.getElementById('modalOverlay').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        function closeModal(e) { if (e.target === document.getElementById('modalOverlay')) closeModalDirect(); }
        function closeModalDirect() {
            document.getElementById('modalOverlay').classList.remove('active');
            document.body.style.overflow = '';
        }
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalDirect(); });

                // ====== ЯНДЕКС.КАРТА ======
        function initYandexMap() {
            const script = document.createElement('script');
            script.src = 'https://api-maps.yandex.ru/2.1/?lang=ru_RU&apikey=' + YANDEX_API_KEY;
            script.type = 'text/javascript';
            document.head.appendChild(script);

            script.onload = function() {
                ymaps.ready(function() {
                    const map = new ymaps.Map('yandexMap', {
                        center: [45.035470, 38.975313],
                        zoom: 12,
                        controls: ['zoomControl', 'fullscreenControl'],
                        type: 'yandex#map'
                    }, {
                        suppressMapOpenBlock: true,
                        restrictMapArea: false
                    });

                  

                    window.districtMap = map;
                });
            };

            script.onerror = function() {
                document.getElementById('yandexMap').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#666;font-size:0.9rem;">⚠️ Ошибка загрузки карты. Проверьте интернет.</div>';
            };
        }
        // ====== ИНИЦИАЛИЗАЦИЯ ======
        renderCards();
        initYandexMap();
    </script>
</body>
</html>
